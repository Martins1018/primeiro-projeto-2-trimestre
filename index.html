<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore - Loja de Celulares</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-container">
            <div class="logo">
                <h1>TechStore</h1>
            </div>
            <div class="header-info">
                <span>📱 Melhores Celulares de 2026</span>
            </div>
        </div>
    </header>

    <div class="container">
        <main class="produtos-grid">
            
            <div class="produto-card">
                <img src="https://i.imgur.com/vHEx3df.png" alt="iPhone 15 Pro" class="produto-img">
                <h3 class="produto-nome">Apple iPhone 15 Pro (128GB)</h3>
                <p class="produto-preco">R$ 6.899,00</p>
                <button class="btn-adicionar" onclick="adicionarAoCarrinho('iPhone 15 Pro', 6899.00)">Adicionar ao Carrinho</button>
            </div>

            <div class="produto-card">
                <img src="https://i.imgur.com/mO2YpQ2.png" alt="Galaxy S24 Ultra" class="produto-img">
                <h3 class="produto-nome">Samsung Galaxy S24 Ultra (256GB)</h3>
                <p class="produto-preco">R$ 5.999,00</p>
                <button class="btn-adicionar" onclick="adicionarAoCarrinho('Galaxy S24 Ultra', 5999.00)">Adicionar ao Carrinho</button>
            </div>

            <div class="produto-card">
                <img src="https://i.imgur.com/S2ZzU4b.png" alt="Xiaomi 14" class="produto-img">
                <h3 class="produto-nome">Xiaomi 14 (512GB) Global</h3>
                <p class="produto-preco">R$ 4.799,00</p>
                <button class="btn-adicionar" onclick="adicionarAoCarrinho('Xiaomi 14', 4799.00)">Adicionar ao Carrinho</button>
            </div>

            <div class="produto-card">
                <img src="https://i.imgur.com/fD0B65k.png" alt="Motorola Edge 50" class="produto-img">
                <h3 class="produto-nome">Motorola Edge 50 Ultra</h3>
                <p class="produto-preco">R$ 3.499,00</p>
                <button class="btn-adicionar" onclick="adicionarAoCarrinho('Motorola Edge 50', 3499.00)">Adicionar ao Carrinho</button>
            </div>

        </main>

        <aside class="carrinho-sidebar">
            <h2>Seu Carrinho</h2>
            <div id="itens-carrinho" class="itens-carrinho">
                <p style="color: #888; text-align: center;" id="carrinho-vazio">O carrinho está vazio</p>
            </div>
            
            <div class="carrinho-total">
                <span>Total:</span>
                <span id="valor-total">R$ 0,00</span>
            </div>

            <button class="btn-finalizar" onclick="finalizarCompra()">Finalizar Compra</button>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
