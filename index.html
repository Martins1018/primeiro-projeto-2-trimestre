<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgroVendas - Produtos do Campo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">
            <h1>Agro<span>Vendas</span></h1>
        </div>
        <div class="cart-icon" onclick="toggleCarrinho()">
            🛒 <span id="cart-count">0</span>
        </div>
    </header>

    <main>
        <section class="products-container">
            <h2>Nossos Produtos</h2>
            <div class="grid-produtos">
                
                <div class="produto-card" data-id="1" data-nome="Saca de Milho (60kg)" data-preco="85.00">
                    <img src="https://images.unsplash.com/photo-1551754655-cd27e38d2076?w=400" alt="Saca de Milho">
                    <h3>Saca de Milho (60kg)</h3>
                    <p class="preco">R$ 85,00</p>
                    <button class="btn-add" onclick="adicionarAoCarrinho(1)">Adicionar ao Carrinho</button>
                </div>

                <div class="produto-card" data-id="2" data-nome="Adubo NPK (50kg)" data-preco="140.00">
                    <img src="https://images.unsplash.com/photo-1599599810769-bcde5a160d32?w=400" alt="Adubo NPK">
                    <h3>Adubo NPK (50kg)</h3>
                    <p class="preco">R$ 140,00</p>
                    <button class="btn-add" onclick="adicionarAoCarrinho(2)">Adicionar ao Carrinho</button>
                </div>

                <div class="produto-card" data-id="3" data-nome="Semente de Soja (40kg)" data-preco="120.00">
                    <img src="https://images.unsplash.com/photo-1594756202469-9ff9799a2e4e?w=400" alt="Semente de Soja">
                    <h3>Semente de Soja (40kg)</h3>
                    <p class="preco">R$ 120,00</p>
                    <button class="btn-add" onclick="adicionarAoCarrinho(3)">Adicionar ao Carrinho</button>
                </div>

            </div>
        </section>

        <aside id="sidebar-carrinho" class="sidebar-carrinho">
            <div class="carrinho-header">
                <h2>Seu Carrinho</h2>
                <button class="btn-fechar" onclick="toggleCarrinho()">&times;</button>
            </div>
            
            <div id="itens-carrinho" class="itens-carrinho">
                <p class="carrinho-vazio">Seu carrinho está vazio.</p>
            </div>

            <div class="carrinho-footer">
                <h3>Total: <span id="total-carrinho">R$ 0,00</span></h3>
                <button class="btn-finalizar" onclick="finalizarCompra()">Finalizar Compra</button>
            </div>
        </aside>
    </main>

    <script src="script.js"></script>
</body>
</html>
