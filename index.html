<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SneakerStore | Loja de Tênis</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Sneaker<span>Store</span></div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Produtos</a>
            <a href="#" id="cart-icon">Carrinho (<span id="cart-count">0</span>)</a>
        </nav>
    </header>

    <section class="banner">
        <h2>Os Melhores Snakers Estão Aqui</h2>
        <p>Estilo, conforto e performance para o seu dia a dia.</p>
    </section>

    <main class="products-container">
        <div class="product-card" data-id="1" data-name="Tênis Sport X" data-price="299.90">
            <div class="product-image" style="background-color: #e0e0e0;">👟</div> 
            <h3>Tênis Sport X</h3>
            <p class="price">R$ 299,90</p>
            <button class="add-to-cart">Adicionar ao Carrinho</button>
        </div>

        <div class="product-card" data-id="2" data-name="Tênis Urban Retro" data-price="399.90">
            <div class="product-image" style="background-color: #d5d5d5;">👟</div>
            <h3>Tênis Urban Retro</h3>
            <p class="price">R$ 399,90</p>
            <button class="add-to-cart">Adicionar ao Carrinho</button>
        </div>

        <div class="product-card" data-id="3" data-name="Tênis Runner Pro" data-price="459.90">
            <div class="product-image" style="background-color: #cccccc;">👟</div>
            <h3>Tênis Runner Pro</h3>
            <p class="price">R$ 459,90</p>
            <button class="add-to-cart">Adicionar ao Carrinho</button>
        </div>
    </main>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn">&times;</span>
            <h2>Seu Carrinho</h2>
            <ul id="cart-items">
                </ul>
            <div class="cart-total">Total: R$ <span id="cart-total-price">0.00</span></div>
            <button id="checkout-btn">Finalizar Compra</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
